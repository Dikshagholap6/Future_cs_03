<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#eef2f7; }

.sidebar {
  width:220px;
  height:100vh;
  position:fixed;
  background:#212529;
  color:#fff;
  padding:20px;
}

.sidebar a {
  display:block;
  padding:10px;
  color:#adb5bd;
  text-decoration:none;
  border-radius:5px;
}

.sidebar a:hover {
  background:#343a40;
  color:#fff;
}

.content {
  margin-left:240px;
  padding:20px;
}

.card {
  border:none;
  border-radius:12px;
  font-size:18px;
  text-align:center;
}

@media(max-width:768px){
  .sidebar { position:relative; width:100%; height:auto; }
  .content { margin-left:0; }
}
</style>
</head>

<body>

<div class="sidebar">
  <h4 class="mb-4">Admin Panel</h4>
  <a href="dashboard.html">Dashboard</a>
  <a href="register.html">Register</a>
  <a href="list.html">Users</a>
</div>

<div class="content">
  <h2 class="mb-4">Dashboard</h2>

  <div class="row g-3">
    <div class="col-md-4">
      <div class="card bg-primary text-white p-4">👤 Users <br><b>1200</b></div>
    </div>
    <div class="col-md-4">
      <div class="card bg-success text-white p-4">🛒 Orders <br><b>340</b></div>
    </div>
    <div class="col-md-4">
      <div class="card bg-warning text-dark p-4">💰 Revenue <br><b>$50K</b></div>
    </div>
  </div>

</div>

</body>
</html>
